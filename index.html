<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
 <!-- ربط ملف الـ Manifest بمساره الصحيح داخل المجلد الفرعي -->
<link rel="manifest" href="/dop/manifest.json">
<meta name="theme-color" content="#1766C2">

    <title>الأعمال اليومية المالية والحسابات </title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <base target="_top">
    
    <style>
        /* تنسيق حاوية التحميل */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* لون خلفية الصفحة أثناء التحميل */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* تصميم الدائرة المتحركة الاحترافي */
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db; /* لون الدائرة المتحرك */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* إخفاء السكرول بار أثناء التحميل */
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <div id="loader-container">
        <div class="loader"></div>
    </div>

    <iframe id="myIframe" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;" 
        src="https://script.google.com/macros/s/AKfycbzyvXr5p2Qa_ACEdSbDSws9PfxOn1pTllEhKvikAkZem17joS--KvddApSKZAdoW8JoRg/exec ">
    </iframe>

    <script>
        // وظيفة لإخفاء دائرة التحميل عند اكتمال تحميل الـ iframe
        var iframe = document.getElementById('myIframe');
        var loader = document.getElementById('loader-container');

        iframe.onload = function() {
            // إضافة تأثير اختفاء تدريجي بسيط
            loader.style.transition = "opacity 0.5s ease";
            loader.style.opacity = "0";
            setTimeout(function() {
                loader.style.display = "none";
            }, 500);
        };
    </script>
<!-- نافذة التنبيه للتثبيت -->
<div id="installBanner" style="display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; padding: 15px 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.4); z-index: 9999; text-align: center; font-family: sans-serif; width: 90%; max-width: 400px;">
  <p style="margin: 0 0 10px 0; font-size: 14px; line-height: 1.4;">قم بتثبيت تطبيق <b>/ الاعمال اليومية /</b> لسهولة الوصول إليه كبرنامج مستقل!</p>
  <div style="display: flex; gap: 10px; justify-content: center;">
    <button id="installBtn" style="background-color: #4CAF50; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; flex: 1;">تثبيت الآن</button>
    <button id="closeBtn" style="background-color: #555; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; flex: 0.5;">لاحقاً</button>
  </div>
</div>

<script>
  let deferredPrompt;
  const installBanner = document.getElementById('installBanner');
  const installBtn = document.getElementById('installBtn');
  const closeBtn = document.getElementById('closeBtn');

  // 1. الفحص الأساسي: هل التطبيق يعمل أصلاً كـ PWA مثبت؟
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  const isDismissed = localStorage.getItem('install_dismissed');

  // إذا لم يكن مثبتاً ولم يقم المستخدم بإغلاق التنبيه سابقاً
  if (!isStandalone && !isDismissed) {
    
    // التقاط حدث المتصفح الرسمي
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // إظهار التنبيه فوراً لوجود حدث التثبيت الجاهز
      installBanner.style.display = 'block';
    });

    // كاحتياطي ذكي: إذا تأخر المتصفح في إطلاق الحدث، نظهر التنبيه بعد ثانيتين ليتحقق المستخدم بنفسه
    setTimeout(() => {
      if (!isStandalone && localStorage.getItem('install_dismissed') !== 'true') {
        installBanner.style.display = 'block';
      }
    }, 2000);
  }

  // عند الضغط على زر التثبيت
  installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
      installBanner.style.display = 'none';
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        localStorage.setItem('install_dismissed', 'true');
      }
      deferredPrompt = null;
    } else {
      // تنبيه إضافي للمتصفحات التي لا تدعم الإنْبثاق التلقائي (مثل آيفون/سفاري)
      alert("للتثبيت: اضغط على خيارات المتصفح (النقاط الثلاث) ثم اختر 'إضافة إلى الشاشة الرئيسية' أو 'تثبيت التطبيق'.");
    }
  });

  // زر إغلاق التنبيه مؤقتاً لكي لا يزعج المستخدم
  closeBtn.addEventListener('click', () => {
    installBanner.style.display = 'none';
    localStorage.setItem('install_dismissed', 'true');
  });
</script>
</body>
</html>
