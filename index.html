<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
 <!-- ربط ملف الـ Manifest بمساره الصحيح داخل المجلد الفرعي -->
<link rel="manifest" href="/dop/manifest.json">
<meta name="theme-color" content="#1766C2">

    <title>الأعمال اليومية المالية والحسابات </title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <base target="_top">
    
    <style>
        /* تنسيق حاوية التحميل */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* لون خلفية الصفحة أثناء التحميل */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* تصميم الدائرة المتحركة الاحترافي */
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db; /* لون الدائرة المتحرك */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* إخفاء السكرول بار أثناء التحميل */
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <div id="loader-container">
        <div class="loader"></div>
    </div>

    <iframe id="myIframe" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;" 
        src="https://script.google.com/macros/s/AKfycbzyvXr5p2Qa_ACEdSbDSws9PfxOn1pTllEhKvikAkZem17joS--KvddApSKZAdoW8JoRg/exec ">
    </iframe>

    <script>
        // وظيفة لإخفاء دائرة التحميل عند اكتمال تحميل الـ iframe
        var iframe = document.getElementById('myIframe');
        var loader = document.getElementById('loader-container');

        iframe.onload = function() {
            // إضافة تأثير اختفاء تدريجي بسيط
            loader.style.transition = "opacity 0.5s ease";
            loader.style.opacity = "0";
            setTimeout(function() {
                loader.style.display = "none";
            }, 500);
        };
    </script>
<!-- نافذة التنبيه للتثبيت (الشكل الجديد) -->
<div id="installBanner" style="display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-20px); background: #ffffff; color: #333; padding: 12px 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 9999; text-align: right; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; width: 90%; max-width: 420px; border: 1px solid #eaeaea; transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out; opacity: 0;">
  
  <div style="display: flex; align-items: center; justify-content: space-between; gap: 15px;">
    <!-- أيقونة الموقع الدائرية -->
    <img src="https://i.ibb.co/PZQt3hvn/Resizer-17847576239321.png" alt="App Icon" style="width: 48px; height: 48px; border-radius: 12px; object-fit: cover; border: 1px solid #eee;">
    
    <!-- النصوص -->
    <div style="flex: 1;">
      <p style="margin: 0 0 4px 0; font-size: 15px; font-weight: 600; color: #000;">تثبيت تطلبق الاعمال اليومية</p>
      <p style="margin: 0; font-size: 13px; color: #666;">spc-salary.github.io</p>
    </div>

    <!-- زر الإغلاق (X) -->
    <button id="closeBtn" style="background: transparent; border: none; font-size: 20px; color: #999; cursor: pointer; padding: 0; line-height: 1; align-self: flex-start;" aria-label="Close">&times;</button>
  </div>

  <!-- زر التثبيت الرئيسي -->
  <button id="installBtn" style="width: 100%; margin-top: 12px; background-color: #007AFF; color: white; border: none; padding: 10px 16px; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 600; text-align: center;">تثبيت</button>

</div>

<script>
  let deferredPrompt;
  const installBanner = document.getElementById('installBanner');
  const installBtn = document.getElementById('installBtn');
  const closeBtn = document.getElementById('closeBtn');

  // 1. الفحص الأساسي
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  const isDismissed = localStorage.getItem('install_dismissed');

  // إذا لم يكن مثبتاً ولم يقم المستخدم بإغلاق التنبيه سابقاً
  if (!isStandalone && isDismissed !== 'true') {
    
    // التقاط حدث المتصفح الرسمي
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // إظهار التنبيه مع تأثير الحركة
      showBanner();
    });

    // كاحتياطي ذكي: نظهر التنبيه بعد 3 ثواني إذا لم يظهر تلقائياً
    setTimeout(() => {
      if (!isStandalone && localStorage.getItem('install_dismissed') !== 'true' && !deferredPrompt) {
         // في حال كان المتصفح لا يدعم الحدث التلقائياً، نعرض رسالة توجيهية في البنر بدلاً من زر تثبيت النظام
         showBanner();
         // تغيير وظيفة الزر ليعمل كإرشاد يدوي
         installBtn.innerText = 'كيفية التثبيت يدوياً';
         installBtn.onclick = () => {
           alert("للتثبيت: اضغط على خيارات المتصفح (النقاط الثلاث) ثم اختر 'إضافة إلى الشاشة الرئيسية' أو 'التثبيت وإنشاء اختصار");
         };
      }
    }, 3000);
  }

  // وظيفة مساعدة لإظهار البنر
  function showBanner() {
    installBanner.style.display = 'block';
    // تفعيل تأثير الظهور والحركة بعد إضافة العنصر للمشهد
    setTimeout(() => {
      installBanner.style.opacity = '1';
      installBanner.style.transform = 'translateX(-50%) translateY(0)';
    }, 50);
  }

  // عند الضغط على زر التثبيت
  installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
      hideBanner();
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        localStorage.setItem('install_dismissed', 'true');
      }
      deferredPrompt = null;
    }
  });

  // زر إغلاق التنبيه
  closeBtn.addEventListener('click', hideBanner);

  function hideBanner() {
    installBanner.style.opacity = '0';
    installBanner.style.transform = 'translateX(-50%) translateY(-20px)';
    // إزالة العنصر تماماً بعد انتهاء حركة الاختفاء
    setTimeout(() => {
      installBanner.style.display = 'none';
    }, 300);
    localStorage.setItem('install_dismissed', 'true');
  }
</script>
</body>
</html>
