<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأعمال اليومية المالية والحسابات</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

#loader-container {
    position: fixed;
    inset: 0;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.loader {
    width: 50px;
    height: 50px;
    border: 5px solid #f3f3f3;
    border-top: 5px solid #3498db;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

iframe {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
}
</style>
</head>

<body>

<div id="loader-container">
    <div class="loader"></div>
</div>

<iframe
    id="myIframe"
    src="https://script.google.com/macros/s/AKfycbzyvXr5p2Qa_ACEdSbDSws9PfxOn1pTllEhKvikAkZem17joS--KvddApSKZAdoW8JoRg/exec">
</iframe>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzyvXr5p2Qa_ACEdSbDSws9PfxOn1pTllEhKvikAkZem17joS--KvddApSKZAdoW8JoRg/exec";

const iframe = document.getElementById("myIframe");
const loader = document.getElementById("loader-container");

// في حال لم يكتمل التحميل خلال 5 ثوانٍ يتم التحويل مباشرة
const fallback = setTimeout(() => {
    window.location.replace(URL);
}, 5000);

// إذا نجح تحميل الـ iframe يتم إلغاء التحويل
iframe.onload = () => {
    clearTimeout(fallback);

    loader.style.transition = "opacity 0.5s";
    loader.style.opacity = "0";

    setTimeout(() => {
        loader.style.display = "none";
    }, 500);
};
</script>
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>نظام الرواتب</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0d6efd">

<link rel="apple-touch-icon"
href="https://cdn.phototourl.com/free/2026-07-12-eacb4075-a23b-456b-8b36-10fef90b261d.png">

<style>
body{
font-family:Tahoma;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
background:#f5f5f5;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#0d6efd;
color:white;
cursor:pointer;
}
</style>

</head>
<body>

<button id="install" style="display:none">
📲 تثبيت التطبيق
</button>

<script>

let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault();

deferredPrompt=e;

document.getElementById("install").style.display="block";

});

document.getElementById("install").onclick=async()=>{

deferredPrompt.prompt();

await deferredPrompt.userChoice;

};

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
</body>
</html>
