<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأعمال اليومية المالية والحسابات</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

#loader-container {
    position: fixed;
    inset: 0;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.loader {
    width: 50px;
    height: 50px;
    border: 5px solid #f3f3f3;
    border-top: 5px solid #3498db;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

iframe {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
}
</style>
</head>

<body>

<div id="loader-container">
    <div class="loader"></div>
</div>

<iframe
    id="myIframe"
    src="https://script.google.com/macros/s/AKfycbzyvXr5p2Qa_ACEdSbDSws9PfxOn1pTllEhKvikAkZem17joS--KvddApSKZAdoW8JoRg/exec">
</iframe>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzyvXr5p2Qa_ACEdSbDSws9PfxOn1pTllEhKvikAkZem17joS--KvddApSKZAdoW8JoRg/exec";

const iframe = document.getElementById("myIframe");
const loader = document.getElementById("loader-container");

// في حال لم يكتمل التحميل خلال 5 ثوانٍ يتم التحويل مباشرة
const fallback = setTimeout(() => {
    window.location.replace(URL);
}, 5000);

// إذا نجح تحميل الـ iframe يتم إلغاء التحويل
iframe.onload = () => {
    clearTimeout(fallback);

    loader.style.transition = "opacity 0.5s";
    loader.style.opacity = "0";

    setTimeout(() => {
        loader.style.display = "none";
    }, 500);
};
</script>
<link rel="manifest" href="/manifest.json">
</body>
</html>
