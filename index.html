<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأعمال اليومية المالية والحسابات</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

#loader-container {
    position: fixed;
    inset: 0;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.loader {
    width: 50px;
    height: 50px;
    border: 5px solid #f3f3f3;
    border-top: 5px solid #3498db;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

iframe {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
}
</style>
</head>

<body>

<div id="loader-container">
    <div class="loader"></div>
</div>

<iframe
    id="myIframe"
    src="https://script.google.com/macros/s/AKfycbzyvXr5p2Qa_ACEdSbDSws9PfxOn1pTllEhKvikAkZem17joS--KvddApSKZAdoW8JoRg/exec">
</iframe>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzyvXr5p2Qa_ACEdSbDSws9PfxOn1pTllEhKvikAkZem17joS--KvddApSKZAdoW8JoRg/exec";

const iframe = document.getElementById("myIframe");
const loader = document.getElementById("loader-container");

// في حال لم يكتمل التحميل خلال 5 ثوانٍ يتم التحويل مباشرة
const fallback = setTimeout(() => {
    window.location.replace(URL);
}, 5000);

// إذا نجح تحميل الـ iframe يتم إلغاء التحويل
iframe.onload = () => {
    clearTimeout(fallback);

    loader.style.transition = "opacity 0.5s";
    loader.style.opacity = "0";

    setTimeout(() => {
        loader.style.display = "none";
    }, 500);
};
</script>
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تثبيت التطبيق</title>

<style>
body{
margin:0;
font-family:Tahoma;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#box{
width:90%;
max-width:350px;
background:#fff;
border-radius:15px;
padding:20px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
text-align:center;
display:none;
}

img{
width:90px;
height:90px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.install{
background:#0d6efd;
color:#fff;
}

.close{
background:#999;
color:#fff;
}
</style>
</head>

<body>

<div id="box">

<!-- ضع اسم صورة الأيقونة هنا -->
<img src="icon.png">

<h3>تثبيت التطبيق</h3>

<p>
للوصول السريع أضف الموقع إلى الشاشة الرئيسية.
</p>

<button class="install" onclick="go()">
فتح الموقع
</button>

<button class="close" onclick="document.getElementById('box').style.display='none'">
إغلاق
</button>

<p style="font-size:13px;color:#666;margin-top:15px;">
في Chrome اضغط ⋮ ثم
<strong>إضافة إلى الشاشة الرئيسية</strong>
</p>

</div>

<script>

if(/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)){
document.getElementById("box").style.display="block";
}else{
location.href="https://spc-salary.github.io/dop/";
}

function go(){
location.href="https://spc-salary.github.io/dop/";
}

</script>

</body>
</html>
</body>
</html>
