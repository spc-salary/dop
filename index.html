<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <!-- أيقونة الموقع للاختصارات والمتصفح -->
<link rel="icon" type="image/png" sizes="192x192" href="https://cdn.phototourl.com/free/2026-07-12-eacb4075-a23b-456b-8b36-10fef90b261d.png">

<!-- أيقونة خاصة بأجهزة أبل (آيفون / آيباد) -->
<link rel="apple-touch-icon" href="https://cdn.phototourl.com/free/2026-07-12-eacb4075-a23b-456b-8b36-10fef90b261d.png">

<!-- اسم الاختصار الذي سيظهر تحت الأيقونة -->
<meta name="apple-mobile-web-app-title" content="/ الاعمال اليومية /">
<meta name="application-name" content="/ الاعمال اليومية /">

<!-- تفعيل وضع العرض كختصار تطبيق مستقل -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

    <title>الأعمال اليومية المالية والحسابات </title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <base target="_top">
    
    <style>
        /* تنسيق حاوية التحميل */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* لون خلفية الصفحة أثناء التحميل */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* تصميم الدائرة المتحركة الاحترافي */
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db; /* لون الدائرة المتحرك */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* إخفاء السكرول بار أثناء التحميل */
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <div id="loader-container">
        <div class="loader"></div>
    </div>

    <iframe id="myIframe" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;" 
        src="https://script.google.com/macros/s/AKfycbzyvXr5p2Qa_ACEdSbDSws9PfxOn1pTllEhKvikAkZem17joS--KvddApSKZAdoW8JoRg/exec ">
    </iframe>

    <script>
        // وظيفة لإخفاء دائرة التحميل عند اكتمال تحميل الـ iframe
        var iframe = document.getElementById('myIframe');
        var loader = document.getElementById('loader-container');

        iframe.onload = function() {
            // إضافة تأثير اختفاء تدريجي بسيط
            loader.style.transition = "opacity 0.5s ease";
            loader.style.opacity = "0";
            setTimeout(function() {
                loader.style.display = "none";
            }, 500);
        };
    </script>

</body>
</html>
