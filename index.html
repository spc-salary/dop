<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الاعمال اليومية المالية والحسابات</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; height: 100vh; font-family: sans-serif; }
        
        /* حاوية التحميل */
        #loader-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #ffffff;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
        }
        
        .loader {
            width: 50px; height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .message { margin-top: 20px; color: #555; }
        
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="loader-container">
        <div class="loader"></div>
        <p class="message">جاري تحميل البيانات، يرجى الانتظار...</p>
    </div>

    <iframe id="myIframe" src="https://script.google.com/macros/s/AKfycbzyvXr5p2Qa_ACEdSbDSws9PfxOn1pTlIEhKvikAkZem17KvddApSKZadow8JoRg/exec"></iframe>

    <script>
        var iframe = document.getElementById('myIframe');
        var loader = document.getElementById('loader-container');
        var targetUrl = "https://script.google.com/macros/s/AKfycbzyvXr5p2Qa_ACEdSbDSws9PfxOn1pTlIEhKvikAkZem17KvddApSKZadow8JoRg/exec";
        
        // مؤقت (Timeout) لمدة 5 ثواني
        var timer = setTimeout(function() {
            // إذا لم يتم التحميل خلال 5 ثواني، يتم التوجيه مباشرة
            window.location.href = targetUrl;
        }, 5000);

        // إذا نجح التحميل قبل الـ 5 ثواني
        iframe.onload = function() {
            clearTimeout(timer); // إيقاف المؤقت
            loader.style.transition = "opacity 0.5s ease";
            loader.style.opacity = "0";
            setTimeout(function() {
                loader.style.display = "none";
                document.body.style.overflow = "auto";
            }, 500);
        };
        
        // ملاحظة: الخطأ ERR_BLOCKED_BY_RESPONSE قد يمنع الـ iframe من إطلاق حدث onload 
        // لذا إذا استمر الخطأ، فالكود أعلاه سيقوم بتحويل المستخدم تلقائياً بعد 5 ثواني.
    </script>
</body>
</html>
